version: "3.8"

services:
  app:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: php_app
    volumes:
      - ../src:/var/www
      - images_data:/var/www/images
    networks:
      - myapp-net

  nginx:
    image: nginx:latest
    container_name: nginx_server
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ../src:/var/www
      - images_data:/var/www/images:ro # read-only mount for Nginx
    networks:
      - myapp-net

  db:
    image: mysql:8.0
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: myapp
      MYSQL_USER: heng
      MYSQL_PASSWORD: hengpass
    volumes:
      - db_data:/var/lib/mysql
      #- ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql # mount init script
    networks:
      - myapp-net
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin
    environment:
      PMA_HOST: db # points phpMyAdmin to the db service
      PMA_PORT: 3306
      PMA_USER: heng
      PMA_PASSWORD: hengpass
    ports:
      - "8080:80" # access phpMyAdmin at http://localhost:8080
    networks:
      - myapp-net
    depends_on:
      - db
volumes:
  images_data:
    driver: local
  db_data:
    driver: local

networks:
  myapp-net:
    driver: bridge
